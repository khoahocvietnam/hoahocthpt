<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Hóa Học THPT - Lớp 10, 11, 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2rem; color: white; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .header p { color: rgba(255,255,255,0.9); margin-top: 10px; }
        .grade-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .grade-btn {
            padding: 12px 35px; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 50px;
            cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.15); color: white;
        }
        .grade-btn.active { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); transform: scale(1.05); }
        .chapters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        .chapter-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .chapter-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 18px; color: white; }
        .chapter-header h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .lessons-list { padding: 15px; max-height: 400px; overflow-y: auto; }
        .lesson-item {
            background: #f8f9fa; border-radius: 12px; margin-bottom: 10px; padding: 12px;
            cursor: pointer; transition: all 0.2s; border-left: 4px solid #667eea;
        }
        .lesson-item:hover { background: #e9ecef; transform: translateX(5px); }
        .lesson-title { font-weight: 600; color: #1f2937; display: flex; align-items: center; gap: 8px; }
        .lesson-meta { display: flex; gap: 15px; margin-top: 8px; font-size: 0.7rem; color: #6c757d; }
        .quiz-types { display: flex; gap: 8px; margin-top: 10px; }
        .type-badge { padding: 3px 8px; border-radius: 15px; font-size: 0.65rem; font-weight: 600; }
        .type-mcq { background: #d1e7ff; color: #0c63e4; }
        .type-short { background: #d1fae5; color: #059669; }
        .type-tf { background: #fff3cd; color: #856404; }
        .quiz-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .quiz-modal.active { display: flex; }
        .modal-content { max-width: 700px; width: 100%; background: white; border-radius: 30px; overflow: hidden; max-height: 90vh; overflow-y: auto; }
        .modal-header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; color: white; }
        .modal-body { padding: 25px; }
        .question-text { font-size: 1.1rem; font-weight: 600; color: #1f2937; margin-bottom: 20px; }
        .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option {
            background: #f8f9fa; border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px 15px;
            cursor: pointer; transition: all 0.2s;
        }
        .option:hover { border-color: #667eea; background: #fef9e6; }
        .option.selected { border-color: #10b981; background: #d1fae5; }
        .option.wrong-answer { border-color: #ef4444; background: #fee2e2; box-shadow: 0 0 15px rgba(239,68,68,0.5); animation: shake 0.3s; }
        .short-input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 1rem; margin-bottom: 20px; }
        .short-input.wrong-answer { border-color: #ef4444; background: #fee2e2; box-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .tf-options { display: flex; gap: 15px; margin-bottom: 20px; }
        .tf-btn { flex: 1; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; background: white; cursor: pointer; font-weight: 600; }
        .tf-btn.selected { background: #667eea; color: white; }
        .tf-btn.wrong-answer { border-color: #ef4444; background: #fee2e2; box-shadow: 0 0 15px rgba(239,68,68,0.5); }
        .explanation { background: #f3f4f6; border-radius: 12px; padding: 15px; margin: 15px 0; border-left: 4px solid #667eea; }
        .modal-footer { display: flex; gap: 15px; padding: 20px; border-top: 1px solid #e5e7eb; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: #e5e7eb; color: #4b5563; }
        .close-modal { position: absolute; top: 20px; right: 20px; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @media (max-width: 768px) { .chapters-grid { grid-template-columns: 1fr; } .grade-btn { padding: 8px 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-flask"></i> Trắc Nghiệm Hóa Học THPT <i class="fas fa-atom"></i></h1>
            <p>Lớp 10 · 11 · 12 | 60+ bài học | 3 dạng câu hỏi</p>
        </div>
        <div class="grade-tabs">
            <button class="grade-btn active" data-grade="10">📘 Lớp 10</button>
            <button class="grade-btn" data-grade="11">📗 Lớp 11</button>
            <button class="grade-btn" data-grade="12">📕 Lớp 12</button>
        </div>
        <div id="chapters-container"></div>
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn-secondary" style="padding: 10px 30px;" onclick="window.location.href='index.html'">← Về trang chủ</button>
        </div>
    </div>

    <div id="quizModal" class="quiz-modal">
        <button class="close-modal" onclick="closeQuiz()"><i class="fas fa-times"></i></button>
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle"></h3></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script>
        const allQuestions = {
            grade10: {
                chapters: [
                    { name: "Chương 1: Nguyên tử", lessons: ["Thành phần nguyên tử", "Hạt nhân nguyên tử", "Đồng vị"] },
                    { name: "Chương 2: Bảng tuần hoàn", lessons: ["Cấu tạo bảng tuần hoàn", "Biến đổi tuần hoàn"] }
                ]
            },
            grade11: {
                chapters: [
                    { name: "Chương 1: Sự điện li", lessons: ["Sự điện li", "Axit - Bazơ - Muối", "pH"] },
                    { name: "Chương 2: Nitơ - Photpho", lessons: ["Nitơ", "Amoniac", "Axit nitric"] }
                ]
            },
            grade12: {
                chapters: [
                    { name: "Chương 1: Este - Lipit", lessons: ["Este", "Lipit", "Xà phòng"] },
                    { name: "Chương 2: Cacbohiđrat", lessons: ["Glucozơ", "Saccarozơ", "Tinh bột"] }
                ]
            }
        };

        function generateQuestions(lessonName) {
            const questions = [];
            for (let i = 0; i < 10; i++) {
                questions.push({
                    text: `Câu hỏi về ${lessonName} (${i+1}): Điều nào sau đây đúng?`,
                    type: "mcq",
                    options: ["Đáp án A", "Đáp án B", "Đáp án C", "Đáp án D"],
                    correct: 0,
                    explanation: `Đây là giải thích cho câu hỏi về ${lessonName}.`
                });
                questions.push({
                    text: `Hãy trình bày hiểu biết của em về ${lessonName}.`,
                    type: "short",
                    explanation: `Đây là câu trả lời mẫu về ${lessonName}.`
                });
                questions.push({
                    text: `${lessonName} có vai trò quan trọng trong đời sống.`,
                    type: "tf",
                    correct: true,
                    explanation: `Đây là nhận định đúng về ${lessonName}.`
                });
            }
            return questions;
        }

        let currentQuestions = [], currentIndex = 0, userAnswers = [];

        function renderGrade(grade) {
            const data = allQuestions[`grade${grade}`];
            let html = '<div class="chapters-grid">';
            data.chapters.forEach(ch => {
                html += `<div class="chapter-card"><div class="chapter-header"><h3>${ch.name}</h3></div><div class="lessons-list">`;
                ch.lessons.forEach(lesson => {
                    const questions = generateQuestions(lesson);
                    html += `<div class="lesson-item" onclick="startQuiz('${lesson}', ${JSON.stringify(questions).replace(/"/g, '&quot;')})">
                        <div class="lesson-title"><i class="fas fa-book"></i> ${lesson}</div>
                        <div class="lesson-meta"><span><i class="fas fa-question-circle"></i> ${questions.length} câu</span></div>
                        <div class="quiz-types">
                            <span class="type-badge type-mcq">5 TN</span>
                            <span class="type-badge type-short">5 TL</span>
                            <span class="type-badge type-tf">5 Đ/S</span>
                        </div>
                    </div>`;
                });
                html += `</div></div>`;
            });
            html += '</div>';
            document.getElementById('chapters-container').innerHTML = html;
        }

        function startQuiz(lessonName, questionsData) {
            currentQuestions = questionsData;
            currentIndex = 0;
            userAnswers = new Array(currentQuestions.length).fill(null);
            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-flask"></i> ${lessonName}`;
            renderQuestion();
            document.getElementById('quizModal').classList.add('active');
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            const modalBody = document.getElementById('modalBody');
            const saved = userAnswers[currentIndex];
            
            let html = `<div class="question-text">${q.text}</div>`;
            if (q.type === 'mcq') {
                html += `<div class="options-list">`;
                q.options.forEach((opt, idx) => {
                    html += `<div class="option ${saved?.value === idx ? 'selected' : ''}" onclick="selectOption(${idx})">${String.fromCharCode(65+idx)}. ${opt}</div>`;
                });
                html += `</div>`;
            } else if (q.type === 'short') {
                html += `<input type="text" class="short-input" id="shortAnswer" placeholder="Nhập câu trả lời..." value="${saved?.value || ''}">`;
            } else {
                html += `<div class="tf-options">`;
                html += `<button class="tf-btn ${saved?.value === true ? 'selected' : ''}" onclick="selectTF(true)">✅ Đúng</button>`;
                html += `<button class="tf-btn ${saved?.value === false ? 'selected' : ''}" onclick="selectTF(false)">❌ Sai</button>`;
                html += `</div>`;
            }
            
            if (saved?.checked) {
                html += `<div class="explanation"><i class="fas fa-lightbulb"></i> ${q.explanation}</div>`;
            }
            
            modalBody.innerHTML = html;
            
            let footerHtml = `<button class="btn btn-secondary" onclick="closeQuiz()">Thoát</button>`;
            if (!saved?.checked) {
                footerHtml += `<button class="btn btn-primary" onclick="checkAnswer()">Kiểm tra</button>`;
            } else if (currentIndex < currentQuestions.length - 1) {
                footerHtml += `<button class="btn btn-primary" onclick="nextQuestion()">Câu tiếp</button>`;
            } else {
                footerHtml += `<button class="btn btn-primary" onclick="finishQuiz()">Hoàn thành</button>`;
            }
            document.getElementById('modalFooter').innerHTML = footerHtml;
        }

        function selectOption(idx) { userAnswers[currentIndex] = { value: idx, checked: false }; renderQuestion(); }
        function selectTF(val) { userAnswers[currentIndex] = { value: val, checked: false }; renderQuestion(); }
        
        function checkAnswer() {
            const q = currentQuestions[currentIndex];
            const ans = userAnswers[currentIndex];
            if (!ans) { alert('Vui lòng chọn đáp án!'); return; }
            let isCorrect = false;
            if (q.type === 'mcq') isCorrect = ans.value === q.correct;
            else if (q.type === 'tf') isCorrect = ans.value === q.correct;
            else {
                const input = document.getElementById('shortAnswer')?.value;
                if (input) { ans.value = input; isCorrect = true; }
            }
            ans.checked = true; ans.isCorrect = isCorrect;
            renderQuestion();
        }
        
        function nextQuestion() { if (currentIndex < currentQuestions.length - 1) { currentIndex++; renderQuestion(); } }
        function finishQuiz() {
            const correct = userAnswers.filter(a => a?.checked && a.isCorrect).length;
            const percent = Math.round((correct / currentQuestions.length) * 100);
            document.getElementById('modalBody').innerHTML = `<div style="text-align:center;padding:40px"><i class="fas fa-trophy" style="font-size:4rem;color:#f59e0b"></i><h2>${percent}%</h2><p>Đúng ${correct}/${currentQuestions.length} câu</p><button class="btn btn-primary" onclick="closeQuiz()">Đóng</button></div>`;
            document.getElementById('modalFooter').innerHTML = '';
        }
        
        function closeQuiz() { document.getElementById('quizModal').classList.remove('active'); }
        
        document.querySelectorAll('.grade-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGrade(btn.dataset.grade);
            });
        });
        renderGrade(10);
    </script>
</body>
</html>
